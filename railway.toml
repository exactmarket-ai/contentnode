# Railway deployment configuration
# Each service is configured in the Railway dashboard with:
#   RAILWAY_DOCKERFILE_PATH service variable pointing to the correct Dockerfile
#
# Services:
#   api     → Dockerfile.api
#   worker  → Dockerfile.worker
#   web     → Dockerfile.web
#
# See ENV_VARS.md for required environment variables per service.

[build]
builder = "dockerfile"

[deploy]
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
