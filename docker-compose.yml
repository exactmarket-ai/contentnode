services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contentnode
      POSTGRES_USER: contentnode
      POSTGRES_PASSWORD: contentnode_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
volumes:
  postgres_data:
