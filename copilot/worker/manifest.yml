# Worker — private BullMQ worker, no public endpoint
name: worker
type: Backend Service

image:
  build:
    dockerfile: Dockerfile.worker
    context: .

cpu: 1024     # 1 vCPU — AI calls are CPU-bound waiting
memory: 2048  # 2 GB — PDF parsing + AI responses can be large

count:
  range: 1-4
  cooldown:
    in: 60s
    out: 120s
  cpu_percentage: 80

variables:
  NODE_ENV: production

secrets:
  DATABASE_URL: /contentnode/production/DATABASE_URL
  REDIS_URL: /contentnode/production/REDIS_URL
  ANTHROPIC_API_KEY: /contentnode/production/ANTHROPIC_API_KEY
  DEEPL_API_KEY: /contentnode/production/DEEPL_API_KEY
  GOOGLE_TRANSLATE_API_KEY: /contentnode/production/GOOGLE_TRANSLATE_API_KEY
  UNDETECTABLE_API_KEY: /contentnode/production/UNDETECTABLE_API_KEY
  BYPASSGPT_API_KEY: /contentnode/production/BYPASSGPT_API_KEY
  GPTZERO_API_KEY: /contentnode/production/GPTZERO_API_KEY
  ORIGINALITY_API_KEY: /contentnode/production/ORIGINALITY_API_KEY
  S3_BUCKET: /contentnode/production/S3_BUCKET
  S3_REGION: /contentnode/production/S3_REGION
  AWS_ACCESS_KEY_ID: /contentnode/production/AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: /contentnode/production/AWS_SECRET_ACCESS_KEY
  PORTAL_BASE_URL: /contentnode/production/PORTAL_BASE_URL

environments:
  production:
    count:
      range: 1-3
